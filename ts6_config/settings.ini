[General]
# Pre-configured identity for the bot — overridden by TS_IDENTITY_KEY env var if set
nickname=tendroaudio

[AudioCapture]
# Use the PulseAudio virtual source created by setup_audio.sh
device=musicbot_sink.mic
enabled=true

[AudioPlayback]
# Playback disabled — the bot is deaf by design, it only transmits.
device=musicbot_deaf
enabled=false

[Connectivity]
# Auto-accept server certificates to avoid blocking UI dialogs
acceptAllCerts=true

# NOTE: VAD / AGC / denoise are NOT configured here. The TS6 desktop client
# stores its audio preprocessor in settings.db (json_blobs.audio_settings),
# not in this INI file. See scripts/ts6_patch_audio.py — it's invoked from
# bootstrap.sh and forces vad=false, agc=false, denoise=false on every boot
# so the music passes through completely clean.
