services:
  ts6-musicbot:
    build: .
    image: ts6-musicbot:latest
    container_name: ts6-musicbot
    restart: unless-stopped

    env_file: .env

    environment:
      - DISPLAY=:99
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - AUDIO_CACHE_DIR=/data/cache
      - TS6_CONFIG_DIR=/data/ts6-config
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUTO_UPDATE_YT_DLP=${AUTO_UPDATE_YT_DLP:-1}

    volumes:
      - ts6_data:/data
      # Uncomment to bind-mount for TrueNAS / host-managed datasets:
      # - /mnt/tank/apps/ts6-musicbot/data:/data

    # Audio is fully virtualized inside the container (PulseAudio null-sink),
    # so /dev/snd is NOT needed and SYS_ADMIN is NOT needed.

    healthcheck:
      test: ["CMD", "python3", "/app/bot/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ts6_data:
