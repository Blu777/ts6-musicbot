# TrueNAS SCALE 24.10+ (Electric Eel / Fangtooth) "Custom App" compose file.
#
# Este compose PULLEA la imagen ya construida desde ghcr.io — NO hace build
# local. Mucho más rápido: primer arranque ~15 s en vez de 2-5 min.
#
# Preparación previa (una sola vez por NAS):
#   1. En TrueNAS, crea el dataset /mnt/<pool>/apps/teamspeak-music/data
#      (con permisos para el usuario "apps", UID 568).
#   2. Descarga el cliente TS6 Linux 64-bit desde
#        https://teamspeak.com/en/downloads/#client
#      y colócalo como:
#        /mnt/<pool>/apps/teamspeak-music/data/teamspeak-client.tar.gz
#      (el container lo extrae en el primer arranque).
#   3. Crea /mnt/<pool>/apps/teamspeak-music/data/.env con las variables que
#      están en .env.example del repo (TS_SERVER_HOST, TS_QUERY_PASSWORD, etc).
#   4. Ajusta los paths `/mnt/HMS/...` de abajo a tu pool.
#   5. Apps → Discover Apps → Custom App → pega este archivo.

services:
  ts6-musicbot:
    image: ghcr.io/blu777/ts6-musicbot:latest
    container_name: ts6-musicbot
    restart: unless-stopped
    pull_policy: always   # jala 'latest' en cada deploy; usá un tag fijo (vX.Y.Z) para producción

    env_file: /mnt/HMS/teamspeak-music/data/.env   # ⚠️ ajusta al path real

    environment:
      - DISPLAY=:99
      - PUID=568      # usuario "apps" estándar de TrueNAS SCALE
      - PGID=568
      - AUDIO_CACHE_DIR=/data/cache
      - TS6_CONFIG_DIR=/data/ts6-config
      - LOG_LEVEL=INFO
      - AUTO_UPDATE_YT_DLP=1

    volumes:
      - /mnt/HMS/teamspeak-music/data:/data   # ⚠️ ajusta al path real

    healthcheck:
      test: ["CMD", "python3", "/app/bot/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
