name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check bot/ || true   # report-only for now

      - name: Run unit tests
        run: pytest -v

  docker-build:
    # Sanity-check the Dockerfile builds (without the proprietary TS6 tarball).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create stub tarball
        run: |
          mkdir -p stub/ts6
          echo '#!/bin/sh' > stub/ts6/TeamSpeak
          chmod +x stub/ts6/TeamSpeak
          tar -czf teamspeak-client.tar.gz -C stub ts6
      - name: Build Docker image
        run: docker build --tag ts6-musicbot:ci .
